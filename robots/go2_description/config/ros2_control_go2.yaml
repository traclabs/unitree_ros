controller_manager:
  ros__parameters:
    update_rate: 1000
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 100.0

joint_trajectory_controller:   
  ros__parameters:
    state_publish_rate: 100.0 # Defaults to 50
    action_monitor_rate: 100.0 # Defaults to 20
    joints:
        - FR_hip_joint
        - FR_thigh_joint
        - FR_calf_joint
        - FL_hip_joint
        - FL_thigh_joint
        - FL_calf_joint
        - RR_hip_joint
        - RR_thigh_joint
        - RR_calf_joint
        - RL_hip_joint
        - RL_thigh_joint
        - RL_calf_joint        
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    allow_partial_joints_goal: false # Defaults to false
    open_loop_control: true
    allow_integration_in_goal_trajectories: false
    constraints:
      stopped_velocity_tolerance: 0.1 # Defaults to 0.01
      goal_time: 0.1 # Defaults to 0.0 (start immediately)   
    gains:  
        FR_hip_joint  : {p: 250.0, i: 0.2, d: 5.0}
        FR_thigh_joint  : {p: 250.0, i: 0.2, d: 5.0}
        FR_calf_joint   : {p: 250.0, i: 0.2, d: 5.0}
        FL_hip_joint  : {p: 250.0, i: 0.2, d: 5.0}
        FL_thigh_joint  : {p: 250.0, i: 0.2, d: 5.0}
        FL_calf_joint   : {p: 250.0, i: 0.2, d: 5.0}
        RR_hip_joint  : {p: 250.0, i: 0.2, d: 5.0}
        RR_thigh_joint  : {p: 250.0, i: 0.2, d: 5.0}
        RR_calf_joint   : {p: 250.0, i: 0.2, d: 5.0}
        RL_hip_joint  : {p: 250.0, i: 0.2, d: 5.0}
        RL_thigh_joint  : {p: 250.0, i: 0.2, d: 5.0}
        RL_calf_joint   : {p: 250.0, i: 0.2, d: 5.0}                
#   {p: 250.0, i: 0.2, d: 5.0} --> previously
